{% extends "base.html" %}

{% block title %}Access Port - Secure Gateway{% endblock %}

{% block content %}
<div class="row justify-content-center align-items-center min-vh-75">
    <div class="col-md-5">
        <!-- Secure Cyber-styled Authentication Card -->
        <div class="card card-cyber">
            <div class="card-header-cyber text-center">
                <h3 class="font-orbitron text-glow-cyan my-2">&lt;IDENTITY_VERIFICATION&gt;</h3>
                <p class="text-muted-cyan font-mono small">ESTABLISH ENCRYPTED SESSION</p>
            </div>
            <div class="card-body p-4">
                <form action="{{ url_for('auth.login') }}" method="POST" autocomplete="off">
                    <!-- Manual CSRF Token Protection -->
                    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

                    <!-- Username / Email Input -->
                    <div class="mb-4">
                        <label for="username_or_email" class="form-label font-mono text-neon-cyan">AGENT_ID (Username or Email)</label>
                        <div class="input-group-cyber">
                            <span class="input-icon font-mono">[ID]</span>
                            <input type="text" 
                                   id="username_or_email" 
                                   name="username_or_email" 
                                   class="form-control cyber-input" 
                                   placeholder="Enter registered credentials" 
                                   value="{{ username_or_email or '' }}"
                                   required>
                        </div>
                    </div>

                    <!-- Password Input -->
                    <div class="mb-4">
                        <div class="d-flex justify-content-between">
                            <label for="password" class="form-label font-mono text-neon-cyan">ACCESS_KEY (Password)</label>
                        </div>
                        <div class="input-group-cyber">
                            <span class="input-icon font-mono">[PW]</span>
                            <input type="password" 
                                   id="password" 
                                   name="password" 
                                   class="form-control cyber-input" 
                                   placeholder="Enter security key" 
                                   required>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <div class="d-grid mb-3">
                        <button type="submit" class="btn btn-cyber-primary font-orbitron py-2">
                            AUTHENTICATE_SESSION
                        </button>
                    </div>

                    <div class="text-center font-mono mt-3">
                        <span class="text-muted-cyan small">No security credentials?</span>
                        <a href="{{ url_for('auth.register') }}" class="text-link-pink small ms-1">Initialize Agent &gt;&gt;</a>
                    </div>
                </form>
            </div>
            <!-- Security Warning Overlay standard for production terminal servers -->
            <div class="card-footer-cyber text-center py-2">
                <span class="security-warning font-mono text-xs">
                    [WARNING] Unauthorized access attempts are monitored and logged.
                </span>
            </div>
        </div>
    </div>
</div>
{% endblock %}
